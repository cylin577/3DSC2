name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            artifact_name: 3DSC2-linux-x64
          - os: windows-latest
            arch: x64
            artifact_name: 3DSC2-windows-x64.exe
          - os: ubuntu-24.04-arm
            arch: aarch64
            artifact_name: 3DSC2-linux-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CPU-only torch for x64
        if: matrix.arch == 'x64'
        run: |
          uv venv
          uv pip uninstall -y torch torchvision
          uv pip install torch==2.9.1+cpu torchvision==0.24.1+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm 3dsc2.spec

      - name: Rename Artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/3DSC2.exe dist/${{ matrix.artifact_name }}
          else
            mv dist/3DSC2 dist/${{ matrix.artifact_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  build-3ds:
    name: Build 3DS Calibration Client
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apt-get update && apt-get install -y wget unzip
          # Install bannertool (diasurgical fork)
          wget https://github.com/diasurgical/bannertool/releases/download/1.2.0/bannertool.zip
          unzip -o bannertool.zip
          mv linux-x86_64/bannertool /usr/local/bin/
          chmod +x /usr/local/bin/bannertool
          # Install makerom (Project_CTR)
          wget https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.3/makerom-v0.18.3-ubuntu_x86_64.zip
          unzip -o makerom-v0.18.3-ubuntu_x86_64.zip -d /usr/local/bin
          chmod +x /usr/local/bin/makerom

      - name: Build .3dsx and .cia
        run: |
          cd calibration_client
          make 3dsx cia

      - name: Upload 3DSX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-calibration-client.3dsx
          path: calibration_client/*.3dsx

      - name: Upload CIA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-calibration-client.cia
          path: calibration_client/*.cia

  release:
    name: Upload to Release
    if: github.event_name == 'release'
    needs: [build-python, build-3ds]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
