name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-22.04-arm
            arch: aarch64
          - os: windows-latest
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install CPU-only torch for Linux
        if: runner.os == 'Linux'
        run: |
          uv pip uninstall -y torch torchvision triton nvidia-cublas-cu12 nvidia-cuda-cupti-cu12 nvidia-cuda-nvrtc-cu12 nvidia-cuda-runtime-cu12 nvidia-cudnn-cu12 nvidia-cufft-cu12 nvidia-cufile-cu12 nvidia-curand-cu12 nvidia-cusolver-cu12 nvidia-cusparse-cu12 nvidia-cusparselt-cu12 nvidia-nccl-cu12 nvidia-nvjitlink-cu12 nvidia-nvshmem-cu12 nvidia-nvtx-cu12
          uv pip install torch==2.9.1 torchvision==0.24.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm 3dsc2.spec

      - name: Upload artifact (Linux x64)
        if: matrix.os == 'ubuntu-22.04' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-linux-x64
          path: dist/3dsc2

      - name: Upload artifact (Linux aarch64)
        if: matrix.os == 'ubuntu-22.04-arm' && matrix.arch == 'aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-linux-aarch64
          path: dist/3dsc2

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-windows-x64.exe
          path: dist/3dsc2.exe

  build-3ds:
    name: Build 3DS Calibration Client
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y wget unzip
          wget https://github.com/Steveice10/bannertool/releases/download/1.2.0/bannertool.zip
          unzip bannertool.zip -d .
          cp linux-x86_64/bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool
          wget https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.3/makerom-v0.18.3-ubuntu_x86_64.zip
          unzip makerom-v0.18.3-ubuntu_x86_64.zip -d .
          cp makerom /usr/local/bin/makerom
          chmod +x /usr/local/bin/makerom

      - name: Build 3dsx and cia
        run: |
          cd calibration_client
          make 3dsx cia

      - name: Upload 3dsx
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-calibration-client.3dsx
          path: calibration_client/*.3dsx

      - name: Upload cia
        uses: actions/upload-artifact@v4
        with:
          name: 3DSC2-calibration-client.cia
          path: calibration_client/*.cia

  release:
    name: Upload to Release
    needs: [build-python, build-3ds]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Get latest release tag
        id: latest_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const latestRelease = releases.data[0];
            core.setOutput('tag_name', latestRelease.tag_name);

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ steps.latest_release.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
