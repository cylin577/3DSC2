[project]
name = "3dsc2"
version = "0.1.0"
description = "3DS Camera View & Control (TAS & Event Replay) - CPU Only"
requires-python = ">=3.10"
dependencies = [
    "opencv-python",
    "pyqt6==6.7.1",
    "numpy",
    "pygame",
    "torch>=2.9.1",
    "torchvision>=0.24.1",
]

[dependency-groups]
dev = [
    "pyinstaller>=6.0",
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }

[tool.uv]
package = false
